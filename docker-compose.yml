# 本地开发用 Postgres 16 (生产环境换腾讯云 CDB 华东上海)
# 启动: docker compose up -d
# 停止: docker compose down
# 完全清空: docker compose down -v
#
# 用户名/密码与 .env.example 里的占位 DATABASE_URL 一致。
# 真实 .env.local 里改成你自己的强口令。
services:
  postgres:
    image: postgres:16-alpine
    container_name: sbj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sbj
      POSTGRES_PASSWORD: sbj_dev_pwd
      POSTGRES_DB: sbj_dev
      # 中文环境字符集
      LANG: en_US.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - sbj-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbj -d sbj_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sbj-postgres-data:
